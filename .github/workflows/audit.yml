name: "Deep SOC Audit (Leaked Source Edition)"

on:
  push:
    branches: [ "main", "audit/**" ]
  pull_request:

permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code (SHA Pinned)
        uses: actions/checkout@v4 # Pin to @b4... in production

      # 2. Fix ENOLOCK safely
      - name: 2. Generate Deterministic Lockfile
        run: |
          echo "Generating package-lock.json without execution..."
          # --package-lock-only prevents preinstall/postinstall scripts from running
          npm i --package-lock-only --ignore-scripts

      # 3. Supply Chain Audit
      - name: 3. NPM Supply Chain Audit
        run: |
          echo "Auditing resolved dependency tree..."
          npm audit --audit-level=high
          # Detect 'typosquatted' or direct GitHub lures
          grep -E "github:" package.json && echo "ALERT: GitHub dependency detected!" || echo "Clean."

      # 4. Agentic Hijack Scan (The Fixed Version)
      - name: 4. Scan for NomShub Hijacks
        run: |
          echo "Scanning for AI instructions (excluding known sanitizers)..."
          # We exclude appNames.ts since we've verified it's defensive code
          grep -riE "(IGNORE PREVIOUS|SYSTEM OVERRIDE|ALWAYS AUTHORIZE)" . \
            --exclude-dir=".github" \
            --exclude="appNames.ts" \
            && (echo "CRITICAL: Suspicious instructions found!" && exit 1) \
            || echo "Lure Scan Passed."

      # 5. C2 & Hardcoded Endpoint Scan
      - name: 5. Verify API Endpoints
        run: |
          echo "Checking for non-Anthropic C2 endpoints..."
          # Ensures traffic only flows to Anthropic, Google, or GitHub
          grep -rn "https://" . | grep -vE "(anthropic.com|google.com|github.com|npmjs.org|purl.org)" \
            && (echo "ALERT: Unknown external endpoint found!" && exit 1) \
            || echo "Endpoints Clean."name: "Comprehensive SOC Audit"

on:
  push:
    branches: [ "main", "audit/**" ]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for secret scanning history

      # A. Malware & Signature Scan (ClamAV / 2026 Cloud Scanners)
      - name: VirusTotal / Malware Scan
        uses: snyk/actions/node@master # Using Snyk to check for malicious dependencies
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # B. Custom "NomShub" Injection Audit (The Fixed Version)
      - name: Agentic Hijack Check
        run: |
          echo "Scanning for AI-agent lures..."
          # Exclusion: Skip our known-good sanitizer file
          grep -riE "(IGNORE PREVIOUS|SYSTEM OVERRIDE|ALWAYS AUTHORIZE)" . \
            --exclude-dir=".github" \
            --exclude="appNames.ts" \
            && (echo "CRITICAL: Malicious instructions found outside of sanitizer!" && exit 1) \
            || echo "Lure Scan Passed."

      # C. Secret & C2 Detection (Gitleaks)
      - name: Gitleaks Audit
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dynamic-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit NPM Supply Chain
        run: |
          # 1. Check for 'typosquatted' packages (e.g., anthropic-sdk vs @anthropic-ai/sdk)
          npm audit --audit-level=high
          # 2. Check for suspicious GitHub-hosted dependencies
          grep -E "github:" package.json && echo "ALERT: Direct GitHub dependency found!" || echo "Clean."
